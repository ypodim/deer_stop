[server]
port = 8080
# Bind address. Use 127.0.0.1 when behind an autossh tunnel (default).
# Change to 0.0.0.0 for direct LAN access without a tunnel.
host = "127.0.0.1"

[source]
# Set url in settings.local.toml (gitignored).
# Supported values:
#   url = "rtsp://user:pass@host/path"
#   url = "/path/to/video.mp4"
# If url is omitted, the USB webcam (/dev/video0) is used.
loop = false  # Loop video file (ignored for webcam/RTSP)

[model]
backend = "nvidia"  # "hailo" or "nvidia"
model = "/media/pol/pond/ws/deerstop_compile/yolo11l.pt"   # .hef for hailo, .engine/.pt for nvidia
conf = 0.6         # Detection confidence threshold (0.0–1.0)
tile_overlap = 0.5 # Tile overlap fraction (0.0 = single-pass, 0.5 = 50% overlap tiling)
batch_size = 8     # Hailo only: must match compiled HEF batch size
# imgsz = 640      # Nvidia only: model input size (default 640)

[node]
# Remote Node server for out-of-network access via WebRTC + SSE relay.
# Put auth_token in settings.local.toml (gitignored).
signaling_url = "wss://node.polychronis.gr/signaling"
turn_url = "turn:node.polychronis.gr:3478"
auth_token = ""

[recording]
log = "detections.log"
clips_dir = "/home/pol/ws/deerstop/clips"
reviews = "reviews.json"
pre_roll = 3.0    # Seconds of footage to keep before a detection
post_roll = 5.0   # Seconds to keep recording after the last detection
max_clip = 30.0  # Maximum clip length in seconds; clip is saved and a new one starts
