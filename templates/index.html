<!DOCTYPE html>
<html>
<head>
  <title>Deer Detection – Live</title>
  <meta charset="utf-8">
  <style>
    body { margin: 0; background: #000; }
    #stream { width: 100%; height: 100vh; object-fit: contain; display: block; }
    nav { position: fixed; top: 10px; right: 10px; }
    nav a {
      color: #4af; text-decoration: none;
      background: rgba(0,0,0,0.7); padding: 6px 12px; border-radius: 4px;
    }
    #stats {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); color: #eee;
      padding: 8px 12px; border-radius: 4px;
      font: 13px/1.6 monospace;
    }
    #stats span { color: #4af; }
  </style>
</head>
<body>
  <nav><a href="/review">&#9744; Review</a></nav>
  <div id="stats">
    <div>CPU &nbsp;&nbsp;<span id="cpu">--</span>%</div>
    <div>Hailo &nbsp;<span id="hailo">--</span>%</div>
    <div>H.FPS &nbsp;<span id="fps">--</span></div>
    <div>Tile/s <span id="tile_fps">--</span></div>
    <div>Frame &nbsp;<span id="frame_ms">--</span> ms</div>
  </div>
  <img id="stream" src="/stream" alt="Live stream">
  <script>
    async function updateStats() {
      try {
        const r = await fetch('/stats');
        const s = await r.json();
        document.getElementById('cpu').textContent =
          s.cpu_percent !== null ? s.cpu_percent.toFixed(1) : '--';
        document.getElementById('hailo').textContent =
          s.hailo_device_util !== null ? s.hailo_device_util.toFixed(1) : '--';
        document.getElementById('fps').textContent =
          s.hailo_fps !== null ? s.hailo_fps.toFixed(1) : '--';
        document.getElementById('tile_fps').textContent =
          s.tile_fps !== null ? s.tile_fps.toFixed(1) : '--';
        document.getElementById('frame_ms').textContent =
          s.frame_ms !== null ? s.frame_ms.toFixed(0) : '--';
      } catch (_) {}
    }
    updateStats();
    setInterval(updateStats, 1000);
  </script>
</body>
</html>
