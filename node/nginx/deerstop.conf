# DeerStop — drop-in nginx config for node.polychronis.gr
# Install: sudo cp deerstop.conf /etc/nginx/conf.d/deerstop.conf
#          sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites on Node:
#   - TLS cert already managed by certbot for node.polychronis.gr
#   - .htpasswd generated: htpasswd -c /etc/nginx/.deerstop.htpasswd <user>
#   - autossh tunnel from detection server forwarding 18080 → detection:8080
#   - Signaling container running on 127.0.0.1:3001

server {
    listen 443 ssl;
    server_name node.polychronis.gr;

    # TLS — managed by certbot; adjust paths if different
    ssl_certificate     /etc/letsencrypt/live/node.polychronis.gr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/node.polychronis.gr/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # -------------------------------------------------------------------------
    # WebRTC signaling (WebSocket, no auth — token validated by server.js)
    # -------------------------------------------------------------------------
    location /signaling {
        proxy_pass          http://127.0.0.1:3001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "Upgrade";
        proxy_set_header    Host       $host;
        proxy_read_timeout  3600s;   # keep WebSocket alive
    }

    # -------------------------------------------------------------------------
    # REST + SSE API (proxied via autossh tunnel from detection server)
    # -------------------------------------------------------------------------
    location /api/ {
        auth_basic           "DeerStop";
        auth_basic_user_file /etc/nginx/.deerstop.htpasswd;

        # Strip /api prefix before forwarding to the detection server
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass          http://127.0.0.1:18080;
        proxy_set_header    Host $host;

        # SSE: disable buffering so events are delivered in real time
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  3600s;
    }

    # Redirect HTTP → HTTPS
    # (handled by a separate server block added by certbot — no action needed)
}
